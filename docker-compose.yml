version: "3.9"
services:
  db:
    image: postgres:16
    container_name: bayi_portal_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bayi_portal
    ports:
      - "5432:5432"
    volumes:
      - bayi_portal_db:/var/lib/postgresql/data
volumes:
  bayi_portal_db:
